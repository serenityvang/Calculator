<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator The Odin Project</title>
        <link rel="stylesheet" href="styles.css">
        <script src="calculator.js" defer></script>
    </head>
    <body>

        <div class="containter">
            <div class="display"><span id="display-content"></span></div>
            <div class="calculator-buttons">

                <button id="back-button"><-</button>
                <button id="clear-button">C</button>
                <button id="percent-button" value="%">%</button>
                <button class="op-button" value="/">/</button>


                <button class="num-button" value="7">7</button>
                <button class="num-button" value="8">8</button>
                <button class="num-button" value="9">9</button>
                <button class="op-button" value="x">x</button>

                <button class="num-button" value="4">4</button>
                <button class="num-button" value="5">5</button>
                <button class="num-button" value="6">6</button>
                <button class="op-button" value="-">-</button>

                <button class="num-button" value="1">1</button>
                <button class="num-button" value="2">2</button>
                <button class="num-button" value="3">3</button>
                <button class="op-button" value="+">+</button> 

                <button id="negation-button" >+/-</button>
                <button class="num-button" value="0">0</button>
                <button class="num-button" value=".">.</button>
                <button id="equal-button">=</button>

            </div>
        </div>
        
    </body>
</html>
